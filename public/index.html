<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp RH Bot - Painel de Testes</title>
  <!-- Google Fonts: Inter e Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-container">
    <!-- BARRA LATERAL (CONTATOS) -->
    <aside class="sidebar">
      <!-- Cabeçalho do Usuário -->
      <header class="sidebar-header">
        <div class="user-profile">
          <div class="avatar user-avatar">🤖</div>
          <div class="user-info">
            <h3>Painel do Gestor</h3>
            <span class="status-online">Online</span>
          </div>
        </div>
        <div class="header-actions">
          <button title="Atualizar Lista" id="btn-refresh-list">
            <i data-lucide="rotate-cw"></i>
          </button>
        </div>
      </header>

      <!-- Barra de Pesquisa -->
      <div class="search-container">
        <div class="search-input-wrapper">
          <i data-lucide="search" class="search-icon"></i>
          <input type="text" id="search-input" placeholder="Pesquisar ou começar uma nova conversa">
        </div>
      </div>

      <!-- Lista de Colaboradores (Simulando Contatos) -->
      <div class="contacts-list" id="contacts-list">
        <!-- Inserido dinamicamente via JS -->
        <div class="contacts-loading">
          <div class="spinner"></div>
          <span>Carregando colaboradores...</span>
        </div>
      </div>
    </aside>

    <!-- ÁREA DE CHAT PRINCIPAL -->
    <main class="chat-container">
      <!-- Estado Inicial (Nenhum Chat Selecionado) -->
      <div class="chat-placeholder" id="chat-placeholder">
        <div class="placeholder-content">
          <div class="placeholder-icon">💬</div>
          <h2>WhatsApp RH Bot</h2>
          <p>Selecione um colaborador na barra lateral para simular uma conversa com o assistente virtual de RH.</p>
          <div class="placeholder-badge">
            <i data-lucide="shield-check"></i> Criptografia de ponta a ponta (Simulação)
          </div>
        </div>
      </div>

      <!-- Chat Ativo -->
      <section class="chat-active" id="chat-active" style="display: none;">
        <!-- Cabeçalho do Chat -->
        <header class="chat-header">
          <div class="contact-details">
            <div class="avatar contact-avatar" id="active-avatar">👤</div>
            <div class="contact-text">
              <h3 id="active-name">Nome do Colaborador</h3>
              <div class="contact-meta">
                <span class="role-dept" id="active-role-dept">Cargo - Departamento</span>
                <span class="separator">•</span>
                <span class="status-badge" id="active-status">Online</span>
              </div>
            </div>
          </div>
          
          <div class="chat-actions">
            <!-- Botão de Concluir Atendimento (Libera o bot do transbordo) -->
            <button id="btn-release-bot" class="btn btn-warning" style="display: none;">
              <i data-lucide="user-check"></i>
              <span>Concluir Atendimento (Liberar Bot)</span>
            </button>
            <!-- Botão de Limpar Histórico -->
            <button id="btn-clear-history" class="btn btn-danger" title="Limpar Histórico e Reiniciar Sessão">
              <i data-lucide="trash-2"></i>
              <span>Reiniciar</span>
            </button>
          </div>
        </header>

        <!-- Container de Mensagens -->
        <div class="messages-container" id="messages-container">
          <!-- Balões de mensagem inseridos dinamicamente -->
        </div>

        <!-- Indicador de Digitação -->
        <div class="typing-indicator" id="typing-indicator" style="display: none;">
          <span class="typing-text">RH Bot está digitando</span>
          <div class="typing-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

        <!-- Rodapé de Digitação -->
        <footer class="chat-input-area">
          <div class="input-actions-left">
            <button class="icon-btn" title="Inserir emoji (Mock)">
              <i data-lucide="smile"></i>
            </button>
            <button class="icon-btn" title="Anexar arquivo (Mock)">
              <i data-lucide="paperclip"></i>
            </button>
          </div>

          <form class="message-form" id="message-form">
            <input type="text" id="message-input" placeholder="Digite uma mensagem" autocomplete="off">
            <button type="submit" class="send-btn" id="send-button" disabled>
              <i data-lucide="send"></i>
            </button>
          </form>
        </footer>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
